  <circle cx="45" cy="55" r="4" fill="#4a90e2" opacity="0.6"/>
  <circle cx="35" cy="75" r="3" fill="#0088ff" opacity="0.4"/>
  <circle cx="50" cy="40" r="2" fill="#FB5414" opacity="0.5"/>
